services:
  postgres:
    image: postgres:17.6-bookworm
    environment:
      POSTGRES_DB: recallstack
      POSTGRES_USER: recallstack
      POSTGRES_PASSWORD: recallstack-local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recallstack -d recallstack"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - recallstack-postgres:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  recallstack-postgres:
